{{- if .Values.showroom.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-showroom
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/showroom
    helm:
      valuesObject:
        showroom:
          enabled: {{ .Values.showroom.enabled }}
          namespace: {{ .Values.showroom.namespace }}
          name: {{ .Values.showroom.name }}
          content:
            repoUrl: {{ .Values.showroom.content.repoUrl | quote }}
            repoRef: {{ .Values.showroom.content.repoRef | quote }}
            antoraPlaybook: {{ .Values.showroom.content.antoraPlaybook | quote }}
            image: {{ .Values.showroom.content.image | quote }}
          nookbag:
            enabled: {{ .Values.showroom.nookbag.enabled }}
            bundleUrl: {{ .Values.showroom.nookbag.bundleUrl | quote }}
          terminal:
            enabled: {{ .Values.showroom.terminal.enabled }}
            image: {{ .Values.showroom.terminal.image | quote }}
            resources:
              requests:
                cpu: {{ .Values.showroom.terminal.resources.requests.cpu | quote }}
                memory: {{ .Values.showroom.terminal.resources.requests.memory | quote }}
              limits:
                cpu: {{ .Values.showroom.terminal.resources.limits.cpu | quote }}
                memory: {{ .Values.showroom.terminal.resources.limits.memory | quote }}
          userData:
            {{- toYaml (.Values.showroom.userData | default dict) | nindent 12 }}
        deployer:
          domain: {{ .Values.deployer.domain | quote }}
        demo:
          namespace: "demo-namespace"
          appName: "demo-appname"
        litemaas:
          apiKey: {{ .Values.litemaas.apiKey | quote }}
          apiUrl: {{ .Values.litemaas.apiUrl | quote }}
          model: {{ .Values.litemaas.model | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.showroom.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
