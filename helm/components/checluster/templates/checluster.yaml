{{- if .Values.checluster.enabled }}
---
apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  name: {{ .Values.checluster.name }}
  namespace: {{ .Values.checluster.namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  components:
    cheServer:
      debug: false
      logLevel: INFO
    dashboard:
      logLevel: ERROR
    metrics:
      enable: true
  containerRegistry: {}
  devEnvironments:
    startTimeoutSeconds: 300
    secondsOfRunBeforeIdling: -1
    maxNumberOfWorkspacesPerUser: -1
    disableContainerRunCapabilities: true
    containerBuildConfiguration:
      openShiftSecurityContextConstraint: container-build
    containerRunConfiguration:
      containerSecurityContext:
        procMount: Unmasked
        capabilities:
          add:
            - SETGID
            - SETUID
        allowPrivilegeEscalation: true
      openShiftSecurityContextConstraint: container-run
    ignoredUnrecoverableEvents:
      - FailedScheduling
    defaultNamespace:
      autoProvision: true
      template: <username>-devspaces
    secondsOfInactivityBeforeIdling: 1800
    storage:
      pvcStrategy: per-user
  gitServices: {}
  networking:
    auth:
      gateway:
        kubeRbacProxy:
          logLevel: 0
        oAuthProxy:
          cookieExpireSeconds: 86400
        traefik:
          logLevel: INFO
{{- end }}
