# Default values for workshop users component
users:
  enabled: true
  count: 20
  prefix: "user"
  password: "openshift"
  devspacesAccess: true
  mtaAccess: true
  # OAuth management - WARNING: Enabling this will replace the entire OAuth config
  # Set to false to only create HTPasswd secret without modifying OAuth
  manageOAuth: true
  # Admin user configuration
  admin:
    enabled: true
    username: "admin"
    password: "openshift"
