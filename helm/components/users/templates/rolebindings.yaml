{{- if .Values.users.enabled }}

{{- if .Values.users.admin.enabled }}
# Cluster admin access for admin user
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.users.admin.username }}-cluster-admin
  labels:
    demo.redhat.com/application: "field-content"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: User
  name: {{ .Values.users.admin.username }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{- range $i := until (int .Values.users.count) }}
{{- $username := printf "%s%d" $.Values.users.prefix (add1 $i) }}
{{- $namespace := printf "%s-devspaces" $username }}

# DevSpaces namespace for each user
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $namespace }}
  labels:
    demo.redhat.com/application: "field-content"
    demo.redhat.com/workshop-user: {{ $username | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"

{{- if $.Values.users.devspacesAccess }}
# Admin access to user's own DevSpaces namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $username }}-admin
  namespace: {{ $namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: User
  name: {{ $username }}
  apiGroup: rbac.authorization.k8s.io

# View access to openshift-devspaces namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $username }}-devspaces-view
  namespace: openshift-devspaces
  labels:
    demo.redhat.com/application: "field-content"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: User
  name: {{ $username }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{- if $.Values.users.mtaAccess }}
# View access to openshift-mta namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $username }}-mta-view
  namespace: openshift-mta
  labels:
    demo.redhat.com/application: "field-content"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: User
  name: {{ $username }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{- end }}
{{- end }}
