spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/secrets
    helm:
      valuesObject:
        secrets:
          enabled: {{ .Values.secrets.enabled }}
